name: Nightly Dashboard Refresh

on:
  schedule:
    - cron: '0 */3 * * *'  # every 3 hours
  workflow_dispatch:       # lets you also trigger it manually

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel redeploy
        run: |
          curl -X POST "https://api.vercel.com/v9/projects/${{ secrets.VERCEL_PROJECT_ID }}/deployments" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"name": "nightly-refresh", "target": "production", "gitSource": {"type": "github", "ref": "main"}}'